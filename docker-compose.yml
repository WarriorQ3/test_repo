name: test-hello-for-effective-mobile
services:
  nginx:
    image: nginx:alpine
    container_name: nginx-for-http-python
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - network-for-application

  backend:
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    build:
      context: ./backend
      args:
        PYTHON_VERSION: 3.11-alpine
    container_name: backend-http-python
    expose:
      - "8080"
    networks:
      - network-for-application
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

networks:
  network-for-application:
    driver: bridge
    name: internal-docker-network
